<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Список завдань</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        input {
            padding: 10px;
            width: 200px;
        }

        button {
            padding: 10px;
            cursor: pointer;
            background: orange;
            border: none;
            color: white;
        }

        li {
            list-style: none;
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 250px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>📝 Список завдань</h1>

    <input type="text" id="taskInput" placeholder="Введи завдання">
    <button onclick="addTask()">Додати</button>

    <ul id="taskList"></ul>

    <script>
        function addTask() {
            let input = document.getElementById("taskInput");

            if (input.value === "") return;

            let li = document.createElement("li");
            li.textContent = input.value;

            // видалення по кліку
            li.onclick = function () {
                li.remove();
            };

            document.getElementById("taskList").appendChild(li);
            input.value = "";
        }
    </script>

</body>
</html>
